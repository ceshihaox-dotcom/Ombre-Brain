name: Mirror to friend's fork

# 自动镜像 main 分支到朋友的 fork (nan1103chang-tech/Ombre-Brain),
# 让她 Zeabur 自动跟随部署, 不用手动 Sync fork.
#
# 触发条件:
#  - push 到 main: 自动镜像
#  - workflow_dispatch: GH UI 手动触发 (用来测试 / 手动重推)
#
# 依赖:
#  - secrets.FRIEND_FORK_PAT 必须配置, 朋友给的 GitHub PAT,
#    fine-grained, 选 nan1103chang-tech/Ombre-Brain, Contents: Read and Write

on:
  push:
    branches: [main]
  workflow_dispatch:

# 防并发: 同时只跑一个镜像, 后到的等前面跑完
concurrency:
  group: mirror-friend-fork
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history, 避免 force push 时 GitHub 拒收
          persist-credentials: false  # 关键: 不让 checkout 设 extraheader 用 GITHUB_TOKEN,
                                      # 否则后续 push 用的是 github-actions[bot] 身份, 推不到外部 repo

      - name: Strip workflows + push to friend's fork
        env:
          FRIEND_PAT: ${{ secrets.FRIEND_FORK_PAT }}
        run: |
          if [ -z "$FRIEND_PAT" ]; then
            echo "::error::FRIEND_FORK_PAT secret 未配置, 跳过镜像"
            exit 1
          fi

          # GitHub 限制: PAT 推 .github/workflows/ 需要 workflow scope.
          # 我们不想要那么大的 PAT 权限, 也用不着朋友 fork 跑 workflow
          # (她只是部署源, Zeabur 直接抓代码), 所以推之前剥掉所有 workflow 文件.
          git config user.email "actions@github.com"
          git config user.name "Mirror Bot"
          if [ -d .github/workflows ]; then
            git rm -rf .github/workflows
            git commit -m "ci: strip workflows in friend fork mirror"
          fi

          # 用 x-access-token 占位用户名 + PAT 作密码, GitHub 标准认证模式
          git push --force \
            "https://x-access-token:${FRIEND_PAT}@github.com/nan1103chang-tech/Ombre-Brain.git" \
            HEAD:main
          echo "✓ 已镜像到 nan1103chang-tech/Ombre-Brain · 朋友 Zeabur 应该自动开始部署"
